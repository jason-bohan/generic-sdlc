# Mount an external target codebase so container agents can read and write it.
#
# Set WORKSPACE_PATH in your .env file:
#   WORKSPACE_PATH=/home/yourname/repos/myproject
#
# The second volume maps the host path to the same absolute path inside the
# container so that workspacePath in .sdlc-framework.config.json resolves
# without translation (required when agents reference absolute paths).
#
# If WORKSPACE_PATH is not set the server starts without an external workspace.
services:
  server:
    volumes:
      - ${WORKSPACE_PATH:-/tmp/sdlc-workspace}:/workspace/project
      - ${WORKSPACE_PATH:-/tmp/sdlc-workspace}:${WORKSPACE_PATH:-/tmp/sdlc-workspace}
