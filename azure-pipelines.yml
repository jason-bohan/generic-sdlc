trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '22.x'
  npmCacheDir: $(Pipeline.Workspace)/.npm
  cypressCacheDir: $(Pipeline.Workspace)/.cypress-cache

steps:
  - task: UseNode@1
    inputs:
      version: '$(nodeVersion)'
    displayName: 'Install Node.js $(nodeVersion)'

  - task: Cache@2
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(npmCacheDir)
    displayName: 'Cache npm packages'

  - task: Cache@2
    inputs:
      key: 'cypress | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        cypress | "$(Agent.OS)"
      path: $(cypressCacheDir)
    displayName: 'Cache Cypress binary'

  - script: npm ci --cache $(npmCacheDir)
    displayName: 'Install dependencies'
    env:
      CYPRESS_CACHE_FOLDER: $(cypressCacheDir)

  - script: |
      npx cypress install
      npx cypress verify
    displayName: 'Install Cypress binary'
    env:
      CYPRESS_CACHE_FOLDER: $(cypressCacheDir)

  - script: npx tsc --noEmit --project tsconfig.json
    displayName: 'Type check (tsc --noEmit)'
    continueOnError: false

  - script: npm test -- --changed origin/$(System.PullRequest.TargetBranch)
    condition: and(succeeded(), ne(variables['Build.Reason'], 'IndividualCI'))
    displayName: 'Unit tests — changed files only (PR)'

  - script: npm test
    condition: and(succeeded(), eq(variables['Build.Reason'], 'IndividualCI'))
    displayName: 'Unit tests — full suite (merge to main)'

  - script: npm run dashboard:build
    displayName: 'Production build'

  # Detect whether frontend/server/test files changed — skip E2E for doc/config-only PRs
  - script: |
      BASE=origin/$(System.PullRequest.TargetBranch)
      CHANGED=$(git diff --name-only "$BASE"...HEAD 2>/dev/null | \
        grep -cE '^(src/|cypress/|Dockerfile|docker-compose)' || echo 0)
      echo "Changed source files: $CHANGED"
      echo "##vso[task.setvariable variable=runE2E]$([ "$CHANGED" -gt 0 ] && echo true || echo false)"
    condition: and(succeeded(), ne(variables['Build.Reason'], 'IndividualCI'))
    displayName: 'Detect if E2E needed (PR)'

  - script: echo "##vso[task.setvariable variable=runE2E]true"
    condition: and(succeeded(), eq(variables['Build.Reason'], 'IndividualCI'))
    displayName: 'Always run E2E on merge to main'

  - script: bash bin/ci-e2e.sh
    condition: and(succeeded(), eq(variables.runE2E, 'true'))
    displayName: 'E2E tests (Cypress + Docker)'
    env:
      CYPRESS_CACHE_FOLDER: $(cypressCacheDir)

  - script: echo "##[warning]E2E skipped — no src/cypress/Dockerfile changes detected"
    condition: and(succeeded(), eq(variables.runE2E, 'false'))
    displayName: 'E2E skipped'

  - task: PublishPipelineArtifact@1
    condition: failed()
    inputs:
      targetPath: 'cypress/screenshots'
      artifact: 'cypress-screenshots'
    displayName: 'Upload Cypress screenshots on failure'
    continueOnError: true
