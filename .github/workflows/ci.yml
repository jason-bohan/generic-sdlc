name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npx tsc --noEmit

  python-tests:
    name: Python tests & deps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml/unsloth

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ml/unsloth/requirements.txt
            ml/unsloth/requirements-test.txt

      # Run the mocked unit tests. They stub torch/unsloth via sys.modules, so they
      # need no GPU or heavy deps — yet today they run in no CI at all.
      - run: pip install -r requirements-test.txt
      - run: pytest

      # Install the pinned ML stack so a dependency bump (especially a MAJOR like
      # datasets vX) actually has to resolve and install. The JS CI never touches
      # Python deps, so without this a breaking Python bump can merge on green CI.
      # torch is intentionally not pinned (CUDA wheels installed separately), but the
      # stack pulls a CPU torch transitively — enough to validate resolution + imports.
      - run: pip install -r requirements.txt
      - run: python -c "import datasets, transformers, huggingface_hub, safetensors; print('python deps import OK')"

  meshllm-image:
    name: Docker build (meshllm CUDA image)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Build only — no GPU, no run. The build pulls the nvidia/cuda base image,
      # downloads the pinned mesh-llm release tarball, and chmod/ln -sf the expected
      # binaries (mesh-llm, *-cuda). Those steps fail loudly if the FROM tag, the
      # MESHLLM_VERSION pin, or the release asset naming drift — e.g. the v0.65.1 →
      # v0.71.0 bump where the asset went -cuda → -cuda-13. No GPU is needed to
      # validate that, only to run the binaries. Keeps nvidia/cuda + mesh-llm bumps
      # from merging unbuilt.
      - run: docker build -f docker/Dockerfile.meshllm-cuda -t meshllm-cuda:ci .
